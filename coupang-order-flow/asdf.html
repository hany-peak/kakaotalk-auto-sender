<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HEALTHIO - 개인 맞춤형 건강 솔루션</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');
        
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background: #0a0a0a;
            color: #ffffff;
            overflow-x: hidden;
            line-height: 1.6;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            position: relative;
        }

        .hero {
            background: linear-gradient(135deg, #0a0a0a 0%, #1a1a2e 50%, #16213e 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            position: relative;
            overflow: hidden;
        }

        .hero::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: radial-gradient(circle at 20% 50%, #00d4ff20 0%, transparent 50%),
                        radial-gradient(circle at 80% 20%, #ff006e20 0%, transparent 50%),
                        radial-gradient(circle at 40% 80%, #8338ec20 0%, transparent 50%);
            pointer-events: none;
        }

        .hero-content {
            padding: 0 40px;
            z-index: 2;
            position: relative;
        }

        .brand-logo {
            font-size: 2.5rem;
            font-weight: 700;
            margin-bottom: 1rem;
            background: linear-gradient(45deg, #00d4ff, #ff006e);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .hero h1 {
            font-size: 4rem;
            font-weight: 300;
            line-height: 1.2;
            margin-bottom: 1.5rem;
        }

        .hero p {
            font-size: 1.2rem;
            color: #b0b0b0;
            margin-bottom: 3rem;
        }

        .cta-button {
            display: inline-block;
            padding: 18px 40px;
            background: linear-gradient(45deg, #00d4ff, #ff006e);
            color: white;
            text-decoration: none;
            border-radius: 50px;
            font-weight: 500;
            font-size: 1.1rem;
            transition: all 0.3s ease;
            box-shadow: 0 10px 30px rgba(0, 212, 255, 0.3);
        }

        .cta-button:hover {
            transform: translateY(-3px);
            box-shadow: 0 20px 40px rgba(0, 212, 255, 0.4);
        }

        .form-section {
            background: #111111;
            padding: 100px 40px;
            position: relative;
        }

        .form-container {
            background: rgba(255, 255, 255, 0.02);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 24px;
            padding: 60px;
            box-shadow: 0 25px 50px rgba(0, 0, 0, 0.5);
        }

        .section-header {
            text-align: center;
            margin-bottom: 60px;
        }

        .section-header h2 {
            font-size: 2.5rem;
            font-weight: 600;
            margin-bottom: 1rem;
            background: linear-gradient(45deg, #ffffff, #b0b0b0);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .section-header p {
            font-size: 1.1rem;
            color: #888;
        }

        .form-step {
            margin-bottom: 50px;
        }

        .step-title {
            font-size: 1.4rem;
            font-weight: 600;
            margin-bottom: 25px;
            color: #ffffff;
            display: flex;
            align-items: center;
        }

        .step-number {
            width: 35px;
            height: 35px;
            background: linear-gradient(45deg, #00d4ff, #ff006e);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 700;
            margin-right: 15px;
            font-size: 0.9rem;
        }

        .form-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 25px;
            margin-bottom: 30px;
        }

        .form-group {
            position: relative;
        }

        label {
            display: block;
            font-weight: 500;
            color: #cccccc;
            margin-bottom: 10px;
            font-size: 0.95rem;
        }

        input, select, textarea {
            width: 100%;
            padding: 16px 20px;
            background: rgba(255, 255, 255, 0.05);
            border: 2px solid rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            color: #ffffff;
            font-size: 1rem;
            transition: all 0.3s ease;
            backdrop-filter: blur(10px);
        }

        input:focus, select:focus, textarea:focus {
            outline: none;
            border-color: #00d4ff;
            background: rgba(0, 212, 255, 0.05);
            box-shadow: 0 0 20px rgba(0, 212, 255, 0.2);
        }

        select option {
            background: #1a1a1a;
            color: #ffffff;
        }

        .checkbox-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 15px;
            margin-top: 15px;
        }

        .checkbox-item {
            position: relative;
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            padding: 16px;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .checkbox-item:hover {
            background: rgba(255, 255, 255, 0.05);
            border-color: rgba(0, 212, 255, 0.3);
        }

        .checkbox-item input[type="checkbox"] {
            position: absolute;
            opacity: 0;
            cursor: pointer;
        }

        .checkbox-item label {
            margin: 0;
            cursor: pointer;
            display: flex;
            align-items: center;
            font-weight: 400;
        }

        .checkbox-item label::before {
            content: '';
            width: 20px;
            height: 20px;
            border: 2px solid rgba(255, 255, 255, 0.3);
            border-radius: 6px;
            margin-right: 12px;
            transition: all 0.3s ease;
            flex-shrink: 0;
        }

        .checkbox-item input[type="checkbox"]:checked + label::before {
            background: linear-gradient(45deg, #00d4ff, #ff006e);
            border-color: transparent;
        }

        .checkbox-item input[type="checkbox"]:checked + label::after {
            content: '✓';
            position: absolute;
            left: 20px;
            top: 50%;
            transform: translateY(-50%);
            color: white;
            font-weight: bold;
            font-size: 12px;
        }

        .submit-btn {
            width: 100%;
            padding: 20px;
            background: linear-gradient(45deg, #00d4ff, #ff006e, #8338ec);
            background-size: 200% 200%;
            border: none;
            border-radius: 15px;
            color: white;
            font-size: 1.2rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.4s ease;
            box-shadow: 0 15px 35px rgba(0, 212, 255, 0.3);
        }

        .submit-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 25px 50px rgba(0, 212, 255, 0.4);
        }

        .results {
            background: #0d0d0d;
            padding: 80px 40px;
            display: none;
        }

        .results-container {
            background: rgba(255, 255, 255, 0.02);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 24px;
            padding: 60px;
            box-shadow: 0 25px 50px rgba(0, 0, 0, 0.5);
        }

        .recommendation-card {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 20px;
            padding: 40px;
            margin-bottom: 30px;
            transition: all 0.3s ease;
        }

        .recommendation-card h3 {
            font-size: 1.5rem;
            font-weight: 600;
            margin-bottom: 25px;
            color: #00d4ff;
        }

        .supplement-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 15px;
            margin-top: 20px;
        }

        .supplement-item {
            background: linear-gradient(135deg, rgba(0, 212, 255, 0.1), rgba(255, 0, 110, 0.1));
            border: 1px solid rgba(0, 212, 255, 0.2);
            border-radius: 12px;
            padding: 20px;
            text-align: center;
            transition: all 0.3s ease;
        }

        .supplement-item:hover {
            transform: translateY(-3px);
            box-shadow: 0 15px 30px rgba(0, 212, 255, 0.2);
        }

        .loading {
            display: none;
            text-align: center;
            padding: 40px;
            color: #00d4ff;
        }

        .loading-spinner {
            width: 50px;
            height: 50px;
            border: 3px solid rgba(0, 212, 255, 0.3);
            border-top: 3px solid #00d4ff;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto 20px;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        @media (max-width: 768px) {
            .hero h1 {
                font-size: 2.5rem;
            }
            
            .form-container, .results-container {
                padding: 30px;
            }
            
            .hero-content {
                padding: 0 20px;
            }
            
            .form-grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <section class="hero">
        <div class="container">
            <div class="hero-content">
                <div class="brand-logo">🏥 HEALTHIO</div>
                <h1>개인 맞춤형<br>건강 솔루션</h1>
                <p>AI 기반 분석으로 당신만의 건강한 라이프스타일을 제안합니다</p>
                <a href="#form" class="cta-button">무료 건강 분석 시작하기</a>
            </div>
        </div>
    </section>

    <section id="form" class="form-section">
        <div class="container">
            <div class="form-container">
                <div class="section-header">
                    <h2>건강 프로파일 분석</h2>
                    <p>몇 가지 질문에 답하시면 맞춤형 건강 솔루션을 제공해드립니다</p>
                </div>

                <form id="healthForm">
                    <div class="form-step">
                        <div class="step-title">
                            <div class="step-number">1</div>
                            기본 정보
                        </div>
                        
                        <div class="form-grid">
                            <div class="form-group">
                                <label for="age">연령대</label>
                                <select id="age" required>
                                    <option value="">선택해주세요</option>
                                    <option value="10-19">10대</option>
                                    <option value="20-29">20대</option>
                                    <option value="30-39">30대</option>
                                    <option value="40-49">40대</option>
                                    <option value="50-59">50대</option>
                                    <option value="60+">60대 이상</option>
                                </select>
                            </div>

                            <div class="form-group">
                                <label for="gender">성별</label>
                                <select id="gender" required>
                                    <option value="">선택해주세요</option>
                                    <option value="male">남성</option>
                                    <option value="female">여성</option>
                                </select>
                            </div>

                            <div class="form-group">
                                <label for="height">키 (cm)</label>
                                <input type="number" id="height" placeholder="예: 175">
                            </div>

                            <div class="form-group">
                                <label for="weight">몸무게 (kg)</label>
                                <input type="number" id="weight" placeholder="예: 70">
                            </div>
                        </div>
                    </div>

                    <div class="form-step">
                        <div class="step-title">
                            <div class="step-number">2</div>
                            건강 상태 및 주의사항
                        </div>
                        
                        <div class="form-group">
                            <label>기존 질환이나 주의사항 (해당되는 것을 모두 선택)</label>
                            <div class="checkbox-grid">
                                <div class="checkbox-item">
                                    <input type="checkbox" id="diabetes" value="당뇨">
                                    <label for="diabetes">당뇨병</label>
                                </div>
                                <div class="checkbox-item">
                                    <input type="checkbox" id="hypertension" value="고혈압">
                                    <label for="hypertension">고혈압</label>
                                </div>
                                <div class="checkbox-item">
                                    <input type="checkbox" id="heart" value="심장질환">
                                    <label for="heart">심장질환</label>
                                </div>
                                <div class="checkbox-item">
                                    <input type="checkbox" id="stomach" value="위장질환">
                                    <label for="stomach">위장질환</label>
                                </div>
                                <div class="checkbox-item">
                                    <input type="checkbox" id="joint" value="관절염">
                                    <label for="joint">관절염</label>
                                </div>
                                <div class="checkbox-item">
                                    <input type="checkbox" id="none" value="없음">
                                    <label for="none">특별한 질환 없음</label>
                                </div>
                            </div>
                        </div>
                    </div>

                    <div class="form-step">
                        <div class="step-title">
                            <div class="step-number">3</div>
                            건강 관리 목적
                        </div>
                        
                        <div class="form-group">
                            <label for="purpose">주요 목적을 선택해주세요</label>
                            <select id="purpose" required>
                                <option value="">선택해주세요</option>
                                <option value="diet">다이어트/체중 관리</option>
                                <option value="health">전반적인 건강 증진</option>
                                <option value="energy">활기/에너지 증진</option>
                                <option value="immunity">면역력 강화</option>
                                <option value="stress">스트레스 관리</option>
                            </select>
                        </div>
                    </div>

                    <div class="form-step">
                        <div class="step-title">
                            <div class="step-number">4</div>
                            생활 패턴 분석
                        </div>
                        
                        <div class="form-grid">
                            <div class="form-group">
                                <label for="meals">식사 패턴</label>
                                <select id="meals">
                                    <option value="">선택해주세요</option>
                                    <option value="regular">규칙적인 3끼</option>
                                    <option value="skip-breakfast">아침 거르기</option>
                                    <option value="skip-dinner">저녁 거르기</option>
                                    <option value="irregular">불규칙한 식사</option>
                                </select>
                            </div>

                            <div class="form-group">
                                <label for="exercise">운동 빈도</label>
                                <select id="exercise">
                                    <option value="">선택해주세요</option>
                                    <option value="none">거의 안 함</option>
                                    <option value="light">주 1-2회</option>
                                    <option value="moderate">주 3-4회</option>
                                    <option value="heavy">주 5회 이상</option>
                                </select>
                            </div>

                            <div class="form-group">
                                <label for="sleep">수면 패턴</label>
                                <select id="sleep">
                                    <option value="">선택해주세요</option>
                                    <option value="good">규칙적이고 충분함 (7-8시간)</option>
                                    <option value="short">부족함 (6시간 미만)</option>
                                    <option value="irregular">불규칙함</option>
                                    <option value="poor">잠들기 어려움</option>
                                </select>
                            </div>

                            <div class="form-group">
                                <label for="stress">스트레스 수준</label>
                                <select id="stress">
                                    <option value="">선택해주세요</option>
                                    <option value="low">낮음</option>
                                    <option value="moderate">보통</option>
                                    <option value="high">높음</option>
                                    <option value="very-high">매우 높음</option>
                                </select>
                            </div>
                        </div>
                    </div>

                    <button type="button" class="submit-btn" id="submitBtn">
                        맞춤 건강 솔루션 분석하기
                    </button>
                </form>

                <div class="loading" id="loading">
                    <div class="loading-spinner"></div>
                    <p>AI가 당신의 건강 데이터를 분석하고 있습니다...</p>
                </div>
            </div>
        </div>
    </section>

    <section id="results" class="results">
        <div class="container">
            <div class="results-container" id="resultsContent">
            </div>
        </div>
    </section>

    <script>
        // 전역 변수
        let currentUserData = {};

        // 이벤트 리스너 설정
        document.addEventListener('DOMContentLoaded', function() {
            document.getElementById('submitBtn').addEventListener('click', handleSubmit);
            
            // 'none' 체크박스 특별 처리
            document.getElementById('none').addEventListener('change', function() {
                if (this.checked) {
                    document.querySelectorAll('input[type="checkbox"]:not(#none)').forEach(cb => {
                        cb.checked = false;
                    });
                }
            });

            // 다른 체크박스들이 선택되면 'none' 해제
            document.querySelectorAll('input[type="checkbox"]:not(#none)').forEach(cb => {
                cb.addEventListener('change', function() {
                    if (this.checked) {
                        document.getElementById('none').checked = false;
                    }
                });
            });
        });

        function handleSubmit() {
            const age = document.getElementById('age').value;
            const gender = document.getElementById('gender').value;
            const purpose = document.getElementById('purpose').value;
            
            if (!age || !gender || !purpose) {
                alert('연령대, 성별, 건강 관리 목적은 필수 입력 항목입니다.');
                return;
            }
            
            // 로딩 화면 표시
            document.getElementById('loading').style.display = 'block';
            document.getElementById('submitBtn').style.display = 'none';
            
            // 분석 시뮬레이션 (3초 후 결과 표시)
            setTimeout(() => {
                generateRecommendations();
                document.getElementById('loading').style.display = 'none';
            }, 3000);
        }

        function generateRecommendations() {
            const data = {
                age: document.getElementById('age').value,
                gender: document.getElementById('gender').value,
                height: document.getElementById('height').value,
                weight: document.getElementById('weight').value,
                purpose: document.getElementById('purpose').value,
                meals: document.getElementById('meals').value,
                exercise: document.getElementById('exercise').value,
                sleep: document.getElementById('sleep').value,
                stress: document.getElementById('stress').value
            };
            
            const conditions = [];
            document.querySelectorAll('input[type="checkbox"]:checked').forEach(checkbox => {
                if (checkbox.value !== '없음') {
                    conditions.push(checkbox.value);
                }
            });
            data.conditions = conditions;

            currentUserData = data;

            const animalPersonality = generateAnimalPersonality(data);
            const supplements = generateSupplements(data);
            const bmiInfo = calculateBMI(data.height, data.weight);
            const recommendedCalories = calculateCalories(data);
            
            displayResults(animalPersonality, data, supplements, bmiInfo, recommendedCalories);
            
            document.getElementById('results').style.display = 'block';
            setTimeout(() => {
                document.getElementById('results').scrollIntoView({ 
                    behavior: 'smooth',
                    block: 'start'
                });
            }, 300);
        }

        function generateAnimalPersonality(userData) {
            const adjectives = ["활기찬", "차분한", "지혜로운", "용감한", "신비로운", "우아한", "강인한", "날렵한", "든든한", "창의적인"];
            const animals = ["사자", "호랑이", "치타", "코끼리", "돌고래", "나무늘보", "판다", "코알라", "독수리", "백조", "여우", "늑대", "곰", "캥거루", "펭귄", "부엉이"];

            const purposeAnimals = {
                diet: ["치타", "가젤", "여우", "늑대"],
                health: ["사자", "코끼리", "독수리", "곰"],
                energy: ["돌고래", "캥거루", "앵무새"],
                immunity: ["코뿔소", "곰", "사자"],
                stress: ["나무늘보", "코알라", "판다", "백조"]
            };

            const selectedAnimals = purposeAnimals[userData.purpose] || animals;
            const randomAnimal = selectedAnimals[Math.floor(Math.random() * selectedAnimals.length)];
            const randomAdjective = adjectives[Math.floor(Math.random() * adjectives.length)];

            const emojiMap = {
                "사자": "🦁", "호랑이": "🐅", "치타": "🐆", "코끼리": "🐘", "돌고래": "🐬",
                "나무늘보": "🦥", "판다": "🐼", "코알라": "🐨", "독수리": "🦅", "백조": "🦢",
                "여우": "🦊", "늑대": "🐺", "곰": "🐻", "캥거루": "🦘", "펭귄": "🐧", "부엉이": "🦉",
                "가젤": "🦌", "코뿔소": "🦏", "앵무새": "🦜"
            };

            return {
                personality: randomAdjective + " " + randomAnimal,
                adjective: randomAdjective,
                animal: randomAnimal,
                emoji: emojiMap[randomAnimal] || "🦄",
                description: randomAdjective + " 성격의 " + randomAnimal + "처럼, 당신만의 방식으로 건강을 관리해나가는 타입입니다."
            };
        }

        function generateSupplements(data) {
            const supplementDb = {
                diet: ['가르시니아 캄보지아', '녹차 추출물', '키토산', 'CLA', 'L-카르니틴'],
                health: ['멀티비타민', '오메가-3', '비타민 D', '마그네슘', '프로바이오틱스'],

        function calculateBMI(height, weight) {
            if (!height || !weight) return null;
            
            const bmi = weight / ((height / 100) ** 2);
            let category, advice, color;
            
            if (bmi < 18.5) {
                category = '저체중';
                advice = '영양소가 풍부한 식단과 근력 운동을 권장합니다.';
                color = '#3498db';
            } else if (bmi < 25) {
                category = '정상체중';
                advice = '현재 체중을 유지하며 규칙적인 운동을 계속하세요.';
                color = '#27ae60';
            } else if (bmi < 30) {
                category = '과체중';
                advice = '균형 잡힌 식단과 유산소 운동을 병행하세요.';
                color = '#f39c12';
            } else {
                category = '비만';
                advice = '전문의 상담을 받고 체계적인 다이어트 계획을 세우세요.';
                color = '#e74c3c';
            }
            
            return { bmi: bmi.toFixed(1), category, advice, color };
        }

        function calculateCalories(data) {
            if (!data.height || !data.weight || !data.age) return null;
            
            const age = parseInt(data.age.split('-')[0]) || 30;
            const height = parseFloat(data.height);
            const weight = parseFloat(data.weight);
            
            let bmr;
            if (data.gender === 'male') {
                bmr = 88.362 + (13.397 * weight) + (4.799 * height) - (5.677 * age);
            } else {
                bmr = 447.593 + (9.247 * weight) + (3.098 * height) - (4.330 * age);
            }
            
            const activityMultiplier = {
                'none': 1.2,
                'light': 1.375,
                'moderate': 1.55,
                'heavy': 1.725
            };
            
            const activity = activityMultiplier[data.exercise] || 1.2;
            const tdee = bmr * activity;
            
            return {
                maintenance: Math.round(tdee),
                weightLoss: Math.round(tdee - 500),
                weightGain: Math.round(tdee + 500)
            };
        }

            if (navigator.share) {
                navigator.share({
                    title: 'HEALTHIO 건강 타입 테스트',
                    text: shareText,
                    url: window.location.href
                });
            } else {
                alert('공유 기능이 실행됩니다! (실제 환경에서는 SNS 공유 기능이 연동됩니다)');
            }
        }

        function copyLink() {
            const shareText = "HEALTHIO에서 동물 타입 테스트를 해보세요! " + window.location.href;
            if (navigator.clipboard) {
                navigator.clipboard.writeText(shareText).then(() => {
                    alert('링크가 복사되었습니다!');
                });
            } else {
                alert('링크 복사 기능을 사용할 수 없습니다.');
            }
        }

        function resetTest() {
            document.getElementById('results').style.display = 'none';
            document.getElementById('submitBtn').style.display = 'block';
            document.getElementById('healthForm').reset();
            document.getElementById('form').scrollIntoView({ 
                behavior: 'smooth',
                block: 'start'
            });
        }

        // 부드러운 스크롤 효과를 위한 함수
        document.querySelectorAll('a[href^="#"]').forEach(anchor => {
            anchor.addEventListener('click', function (e) {
                e.preventDefault();
                const target = document.querySelector(this.getAttribute('href'));
                if (target) {
                    target.scrollIntoView({
                        behavior: 'smooth',
                        block: 'start'
                    });
                }
            });
        });

        // 버튼 호버 효과
